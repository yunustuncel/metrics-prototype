<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metrics selection prototype</title>
<style>
  :root {
    --bg: #16161a; --panel: #1c1d23; --panel-2: #23242c; --row-hover: #262832; --row-sel: #202a44;
    --border: #33343e; --border-strong: #43444f;
    --text: #e8e9ee; --text-dim: #9a9ba6; --text-mute: #6c6d78;
    --accent: #4a7cff; --accent-bg: #1e2740; --accent-text: #93b4ff; --accent-border: #2f4372;
    --green: #3ecf8e; --green-bg: #16302a; --green-text: #6be0ad;
    --danger: #ef5a5a; --radius: 7px;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.5; padding: 24px; }
  .wizard-head { color: var(--text-mute); font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  .step { display: flex; align-items: center; gap: 10px; color: var(--text-dim); margin: 18px 0; }
  .step .num { width: 22px; height: 22px; border-radius: 5px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .step .title { font-size: 15px; font-weight: 500; color: var(--text); }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
  .filterbar { flex: 1; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; min-height: 38px; background: var(--panel); cursor: text; }
  .chip { background: var(--panel-2); color: var(--text); padding: 3px 8px; border-radius: 5px; display: inline-flex; align-items: center; gap: 5px; font-size: 12px; border: 1px solid var(--border-strong); }
  .chip .x { cursor: pointer; opacity: .7; } .chip .x:hover { opacity: 1; }
  .filter-input { background: transparent; border: none; color: var(--text); outline: none; font-size: 13px; font-family: var(--sans); min-width: 120px; flex: 1; }
  .filter-input::placeholder { color: var(--text-mute); }

  button { font-family: var(--sans); font-size: 13px; cursor: pointer; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--panel-2); color: var(--text); padding: 8px 12px; display: inline-flex; align-items: center; gap: 6px; transition: background .12s; }
  button:hover { background: var(--row-hover); } button:active { transform: scale(.98); }
  button:disabled { opacity: .4; cursor: not-allowed; } button:disabled:hover { background: var(--panel-2); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; } button.primary:hover { background: #5b89ff; }
  button.sm { padding: 5px 10px; font-size: 12px; }
  button.danger { color: #f19a9a; } button.danger:hover:not(:disabled) { background: #3a2222; border-color: #6a3333; }
  button.ghost { border-color: transparent; background: transparent; } button.ghost:hover { background: var(--row-hover); }

  .outer { border: 1px solid var(--border); border-radius: 11px; overflow: hidden; background: var(--panel); }
  table.outer-tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .outer-tbl col.c-svc { width: auto; } .outer-tbl col.c-mon { width: 110px; } .outer-tbl col.c-cus { width: 90px; }
  .outer-tbl col.c-rec { width: 170px; } .outer-tbl col.c-auto { width: 170px; }
  .outer-tbl thead th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; padding: 13px 15px; border-bottom: 1px solid var(--border); background: var(--panel-2); vertical-align: middle; }
  .outer-tbl thead th.center { text-align: center; }

  .svc-summary { cursor: pointer; }
  .svc-summary:hover > td { background: var(--row-hover); }
  .svc-summary > td { padding: 13px 15px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .svc-summary.expanded > td { border-bottom: none; }
  .svc-left { display: flex; align-items: center; gap: 11px; }
  .chevron { transition: transform .18s; display: inline-block; color: var(--text-dim); flex-shrink: 0; }
  .chevron.open { transform: rotate(90deg); }
  .svc-name { font-weight: 500; font-size: 14px; } .svc-ns { color: var(--text-mute); font-size: 11px; font-family: var(--mono); }
  .badge { padding: 2px 9px; border-radius: 20px; font-size: 12px; }
  .badge.accent { background: var(--accent-bg); color: var(--accent-text); } .badge.off { background: var(--panel-2); color: var(--text-mute); }

  .ctrl { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-size: 12px; justify-content: center; }
  .toggle { position: relative; width: 34px; height: 19px; border-radius: 11px; background: var(--border-strong); border: none; cursor: pointer; padding: 0; transition: background .15s; flex-shrink: 0; }
  .toggle.on { background: var(--accent); }
  .toggle .knob { position: absolute; top: 2px; left: 2px; width: 15px; height: 15px; border-radius: 50%; background: #fff; transition: left .15s; }
  .toggle.on .knob { left: 17px; }

  .nested-row > td { padding: 0; border-bottom: 1px solid var(--border); background: var(--bg); }
  .nested-row.collapsed { display: none; }
  .detail-inset { margin: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

  .auto-banner { display: flex; align-items: flex-start; gap: 10px; padding: 12px 15px; background: var(--accent-bg); border-bottom: 1px solid var(--accent-border); color: var(--accent-text); font-size: 12px; }
  .auto-banner svg.i { flex-shrink: 0; margin-top: 1px; }
  .auto-banner strong { color: #cfe0ff; font-weight: 500; }

  .metrics-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 15px; border-bottom: 1px solid var(--border); }
  .sel-count { color: var(--text-dim); font-size: 12px; margin-right: 4px; }

  table.inner-tbl { width: 100%; border-collapse: collapse; }
  table.inner-tbl thead th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; padding: 9px 15px; border-bottom: 1px solid var(--border); }
  table.inner-tbl tbody td { padding: 10px 15px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: middle; }
  table.inner-tbl tbody tr:last-child td { border-bottom: none; }
  table.inner-tbl tbody tr { cursor: pointer; }
  table.inner-tbl tbody tr:hover { background: var(--row-hover); }
  table.inner-tbl tbody tr.selected { background: var(--row-sel); }
  table.inner-tbl tbody tr.selected:hover { background: #26325a; }
  table.inner-tbl tbody tr.disabled td.dim { opacity: .42; }
  .mname { font-family: var(--mono); font-size: 12px; color: var(--text); }
  .cat { color: var(--text-dim); }
  .src-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border-strong); color: var(--text-mute); margin-left: 8px; vertical-align: middle; }
  .src-custom { color: var(--accent-text); border-color: var(--accent-border); }
  .type-chip { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 1px solid; }
  .type-rec { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent-border); }
  .type-custom { background: #2b1f0e; color: #e8a44a; border-color: #5a3a10; }
  .tagged { color: var(--green-text); display: inline-flex; align-items: center; gap: 6px; }
  .check-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--green); background: var(--green-bg); flex-shrink: 0; }
  .aggs { color: var(--text-dim); font-family: var(--mono); font-size: 11px; }
  input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .consumption { color: var(--text-dim); font-size: 11px; display: inline-flex; align-items: center; gap: 5px; }
  .bar { width: 42px; height: 5px; border-radius: 3px; background: var(--panel-2); overflow: hidden; display: inline-block; }
  .bar > span { display: block; height: 100%; background: var(--accent); }
  .foot { display: flex; align-items: center; justify-content: space-between; padding: 9px 15px; color: var(--text-dim); font-size: 12px; }
  .empty { padding: 22px 15px; text-align: center; color: var(--text-mute); font-size: 12px; }
  .selhint { color: var(--text-mute); font-size: 11px; margin-left: auto; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: flex-start; justify-content: center; padding-top: 70px; z-index: 50; opacity: 0; pointer-events: none; transition: opacity .15s; }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal { width: 460px; max-width: 92vw; background: var(--panel); border: 1px solid var(--border-strong); border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.5); transform: translateY(-8px); transition: transform .15s; }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .modal-head h2 { margin: 0; font-size: 16px; font-weight: 500; }
  .modal-body { padding: 18px 20px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--text); }
  .field .req { color: var(--danger); }
  .field input[type=text], .field select { width: 100%; background: var(--panel-2); border: 1px solid var(--border-strong); color: var(--text); border-radius: 6px; padding: 9px 11px; font-size: 13px; font-family: var(--sans); outline: none; }
  .field input[type=text]:focus, .field select:focus { border-color: var(--accent); }
  .field .hint { font-size: 11px; color: var(--text-mute); margin-top: 5px; }
  .field .hint.ok { color: var(--green-text); } .field .hint.warn { color: #e6c07a; }
  .ns-back { font-size: 11px; color: var(--accent-text); cursor: pointer; margin-top: 6px; display: inline-flex; align-items: center; gap: 4px; }
  .suggest { border: 1px solid var(--border-strong); border-top: none; border-radius: 0 0 6px 6px; background: var(--panel-2); max-height: 150px; overflow-y: auto; }
  .suggest div { padding: 8px 11px; font-family: var(--mono); font-size: 12px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .suggest div:hover { background: var(--accent-bg); }
  .link-box { background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; font-size: 12px; }
  .link-box .lb-title { color: var(--text-dim); margin-bottom: 6px; }
  .link-box .ent { color: var(--accent-text); font-family: var(--mono); font-size: 12px; }
  .link-box .lbls { color: var(--text-mute); font-family: var(--mono); font-size: 11px; margin-top: 2px; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); }
  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green-bg); border: 1px solid #1f5a44; color: var(--green-text); padding: 10px 16px; border-radius: var(--radius); font-size: 13px; opacity: 0; pointer-events: none; transition: all .2s; z-index: 60; display: flex; align-items: center; gap: 8px; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  svg.i { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; vertical-align: middle; }
</style>
</head>
<body>

<div class="wizard-head">New connection</div>
<div class="step"><span class="num">2</span><span class="title">Select observability options</span></div>

<div class="toolbar">
  <div class="filterbar" onclick="document.getElementById('filterInput').focus()">
    <svg class="i" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    <span id="filterChips"></span>
    <input class="filter-input" id="filterInput" placeholder="Filter by name, category, entity type…" autocomplete="off">
  </div>
  <button><svg class="i" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export JSON</button>
  <button onclick="resetState()" title="Clear saved changes and restore defaults"><svg class="i" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg> Reset</button>
  <button class="primary" onclick="openModal(null)"><svg class="i" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add metric</button>
</div>

<div class="outer">
  <table class="outer-tbl">
    <colgroup><col class="c-svc"><col class="c-mon"><col class="c-cus"><col class="c-rec"><col class="c-auto"></colgroup>
    <thead><tr>
      <th>Service</th><th class="center">Monitored</th><th class="center">Custom</th><th class="center">Recommended set</th><th class="center">Autodiscovery</th>
    </tr></thead>
    <tbody id="services"></tbody>
  </table>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head"><h2>Add metric</h2>
      <button class="ghost" onclick="closeModal()"><svg class="i" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Namespace <span class="req">*</span></label>
        <select id="mNs" onchange="onNsChange()">
          <option value="__custom">+ Add custom namespace</option>
          <option value="ce" selected>compute.googleapis.com</option>
          <option value="sql">cloudsql.googleapis.com</option>
          <option value="storage">storage.googleapis.com</option>
          <option value="pubsub">pubsub.googleapis.com</option>
        </select>
        <input type="text" id="mNsCustom" placeholder="e.g. mycompany.custom.googleapis.com" style="display:none; margin-top:8px;">
        <div class="ns-back" id="mNsBack" style="display:none;" onclick="cancelCustomNs()"><svg class="i" viewBox="0 0 24 24" style="width:12px;height:12px;"><polyline points="15 18 9 12 15 6"/></svg> Back to list</div>
      </div>
      <div class="field"><label>Metric name <span class="req">*</span></label>
        <input type="text" id="mName" placeholder="Start typing to search available metrics…" autocomplete="off">
        <div class="suggest" id="mSuggest" style="display:none;"></div>
        <div class="hint" id="mHint">Search the validated list, or enter a custom name — we'll verify it exists.</div>
      </div>
      <div class="field"><label>Aggregations <span class="req">*</span></label>
        <select><option>Select an option</option><option>ALIGN_MEAN</option><option>ALIGN_MAX</option><option>ALIGN_RATE</option><option>ALIGN_SUM</option></select>
      </div>
      <div class="field"><label>Labels (dimensions) <span class="req">*</span></label>
        <select id="mLabels" onchange="updateLinking()"><option value="">Select or type a label…</option><option>project_id</option><option>instance_id</option><option>zone</option></select>
      </div>
      <div class="link-box"><div class="lb-title">Metrics linking</div>
        <div id="linkContent" style="color:var(--text-mute);">Add labels above to see matching entity types.</div>
      </div>
    </div>
    <div class="modal-foot"><button onclick="closeModal()">Cancel</button><button class="primary" onclick="submitMetric()">Add metric</button></div>
  </div>
</div>

<div class="toast" id="toast"><svg class="i" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span id="toastMsg">Metric added</span></div>

<script>
const svg = {
  chev: '<svg class="i" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>',
  check: '<svg class="i" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
  radar: '<svg class="i" viewBox="0 0 24 24"><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 6h.01"/><path d="M2.29 9.62A10 10 0 1 0 21.31 8.35"/><path d="M16.24 7.76A6 6 0 1 0 8.23 16.67"/><path d="M12 18h.01"/><circle cx="12" cy="12" r="2"/></svg>',
  trash: '<svg class="i" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  x: '<svg class="i" viewBox="0 0 24 24" style="width:12px;height:12px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
};

const STORAGE_KEY = 'metrics-prototype-state';

function saveState() {
  const data = services.map(s => ({
    ...s,
    sel: [...s.sel]
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadState(defaults) {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return defaults;
    return JSON.parse(saved).map(s => ({
      ...s,
      sel: new Set(s.sel),
      metrics: s.metrics.map(m => ({
        ...m,
        on: m.source === 'rec' ? s.recOn : m.on
      }))
    }));
  } catch { return defaults; }
}

const defaultServices = [
  { id:'ce', name:'Compute Engine', ns:'compute.googleapis.com', open:true, recOn:true, autoOn:false, sel:new Set(), metrics:[
    { m:'instance/cpu/utilization', cat:'CPU', unit:'ratio', agg:'ALIGN_MEAN +2', tag:true, on:true, use:80, source:'rec' },
    { m:'instance/cpu/reserved_cores', cat:'CPU', unit:'1', agg:'ALIGN_MEAN, ALIGN_MAX', tag:true, on:true, use:35, source:'rec' },
    { m:'instance/disk/read_bytes_count', cat:'Disk', unit:'By', agg:'ALIGN_RATE +2', tag:true, on:true, use:60, source:'rec' },
    { m:'instance/disk/write_bytes_count', cat:'Disk', unit:'By', agg:'ALIGN_RATE +2', tag:true, on:true, use:55, source:'rec' },
    { m:'instance/network/received_bytes', cat:'Network', unit:'By', agg:'ALIGN_RATE +2', tag:true, on:true, use:48, source:'rec' },
    { m:'instance/network/sent_bytes', cat:'Network', unit:'By', agg:'ALIGN_RATE +2', tag:false, on:true, use:44, source:'rec' },
    { m:'instance/uptime', cat:'Uptime', unit:'s', agg:'ALIGN_DELTA, ALIGN_SUM', tag:true, on:true, use:12, source:'rec' },
    { m:'instance/memory/balloon', cat:'Memory', unit:'By', agg:'ALIGN_MEAN', tag:true, on:false, use:20, source:'disc' },
    { m:'instance/disk/operation_count', cat:'Disk', unit:'1', agg:'ALIGN_RATE', tag:false, on:false, use:15, source:'disc' },
    { m:'firewall/dropped_bytes_count', cat:'Network', unit:'By', agg:'ALIGN_RATE', tag:false, on:false, use:8, source:'disc' },
  ]},
  { id:'sql', name:'Cloud SQL', ns:'cloudsql.googleapis.com', open:false, recOn:true, autoOn:false, sel:new Set(), metrics:[
    { m:'database/cpu/utilization', cat:'CPU', unit:'ratio', agg:'ALIGN_MEAN', tag:true, on:true, use:70, source:'rec' },
    { m:'database/memory/usage', cat:'Memory', unit:'By', agg:'ALIGN_MEAN', tag:true, on:true, use:58, source:'rec' },
    { m:'database/disk/utilization', cat:'Disk', unit:'ratio', agg:'ALIGN_MEAN', tag:true, on:true, use:40, source:'rec' },
    { m:'database/network/connections', cat:'Network', unit:'1', agg:'ALIGN_MEAN', tag:false, on:true, use:33, source:'rec' },
    { m:'database/uptime', cat:'Uptime', unit:'s', agg:'ALIGN_SUM', tag:true, on:true, use:9, source:'rec' },
    { m:'database/replication/lag', cat:'Replication', unit:'s', agg:'ALIGN_MEAN', tag:false, on:false, use:11, source:'disc' },
    { m:'database/disk/read_ops_count', cat:'Disk', unit:'1', agg:'ALIGN_RATE', tag:false, on:false, use:6, source:'disc' },
  ]}
];

const services = loadState(defaultServices);

let filters = [];
const known = ['instance/cpu/utilization','instance/cpu/reserved_cores','instance/disk/read_bytes_count','instance/disk/write_bytes_count','instance/network/received_bytes','instance/network/sent_bytes','instance/uptime','instance/memory/balloon','instance/disk/operation_count','firewall/dropped_bytes_count'];

function visibleMetrics(s){
  return s.metrics.filter(m => {
    if(m.source==='custom') return true;
    if(m.source==='rec') return true;
    if(m.source==='disc') return s.autoOn;
    return true;
  });
}
function visibleFiltered(s){ return visibleMetrics(s).filter(passFilter); }

function render(){
  const root = document.getElementById('services');
  root.innerHTML = services.map(s => {
    const vis = visibleMetrics(s);
    const monCount = vis.filter(m=>m.on).length;
    const customCount = s.metrics.filter(m=>m.source==='custom').length;
    const discCount = s.metrics.filter(m=>m.source==='disc').length;
    // prune selection to visible rows
    [...s.sel].forEach(gi => { if(!vis.includes(s.metrics[gi])) s.sel.delete(gi); });

    const vf = visibleFiltered(s);
    const rows = vf.map((m) => {
      const gi = s.metrics.indexOf(m);
      const isSel = s.sel.has(gi);
      const typeChip = m.source==='rec' ? '<span class="type-chip type-rec">Recommended</span>' : m.source==='custom' ? '<span class="type-chip type-custom">Custom</span>' : '';
      const recLocked = m.source==='rec' && s.recOn;
      const effectiveOn = recLocked ? true : m.on;
      const rowDisabled = m.source !== 'rec' && !m.on;
      return `<tr class="${rowDisabled?'disabled':''} ${isSel?'selected':''}" onclick="rowClick(event,'${s.id}',${gi})">
        <td style="width:34px"><input type="checkbox" ${effectiveOn?'checked':''} ${recLocked?'disabled':''} onclick="event.stopPropagation()" onchange="toggleMetric('${s.id}',${gi})"></td>
        <td class="mname dim">${m.m}</td>
        <td class="dim">${typeChip}</td>
        <td class="cat dim">${m.cat}</td>
        <td class="dim" style="color:var(--text-dim)">${m.unit}</td>
        <td class="aggs dim">${m.agg}</td>
        <td class="dim">${m.tag ? '<span class="tagged"><span class="check-badge">'+svg.check+'</span> Supported</span>' : '<span style="color:var(--text-mute)">—</span>'}</td>
        <td class="dim"><span class="consumption"><span class="bar"><span style="width:${m.use}%"></span></span> ${m.use>60?'High':m.use>30?'Med':'Low'}</span></td>
      </tr>`;
    }).join('');

    const selArr = [...s.sel];
    const selCount = selArr.length;
    const allSelected = vf.length>0 && vf.every(m=>s.sel.has(s.metrics.indexOf(m)));
    const removable = selCount>0 && selArr.every(gi => s.metrics[gi].source==='custom');

    const banner = s.autoOn ? `<div class="auto-banner">${svg.radar}<div><strong>Autodiscovery is on.</strong> ${discCount} additional metric${discCount!==1?'s':''} discovered in this namespace ${discCount!==1?'are':'is'} shown below alongside the recommended set. Enable the ones you want to monitor.</div></div>` : '';

    const body = vis.length ? `
        ${banner}
        <div class="metrics-toolbar">
          <input type="checkbox" ${allSelected?'checked':''} onchange="selectAll('${s.id}', this.checked)" aria-label="Select all">
          <span class="sel-count">${selCount} selected</span>
        </div>
        <table class="inner-tbl">
          <thead><tr><th style="width:34px"></th><th>Metric name</th><th>Type</th><th>Category</th><th>Unit</th><th>Aggregations</th><th>Tag enrichment</th><th>Consumption</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="foot"><span>50 rows per page</span><span>Page 1 of 1</span></div>`
      : `<div class="empty">No metrics enabled for this service. Turn on the recommended set, autodiscovery, or add a metric.</div>`;

    return `
    <tr class="svc-summary ${s.open?'expanded':''}" onclick="toggleService('${s.id}')">
      <td>
        <div class="svc-left">
          <span class="chevron ${s.open?'open':''}">${svg.chev}</span>
          <div><div class="svc-name">${s.name}</div><div class="svc-ns">${s.ns}</div></div>
        </div>
      </td>
      <td style="text-align:center"><span class="badge ${monCount?'accent':'off'}">${monCount}</span></td>
      <td style="text-align:center">${customCount?`<span class="badge off">${customCount}</span>`:'<span style="color:var(--text-mute)">—</span>'}</td>
      <td><div class="ctrl" onclick="event.stopPropagation()"><button class="toggle ${s.recOn?'on':''}" onclick="toggleRec('${s.id}')" aria-label="Recommended set"><span class="knob"></span></button><span>${s.recOn?'On':'Off'}</span></div></td>
      <td><div class="ctrl" onclick="event.stopPropagation()"><button class="toggle ${s.autoOn?'on':''}" onclick="toggleAuto('${s.id}')" aria-label="Autodiscovery"><span class="knob"></span></button><span>${s.autoOn?'On':'Off'}</span></div></td>
    </tr>
    <tr class="nested-row ${s.open?'':'collapsed'}">
      <td colspan="5"><div class="detail-inset">${body}</div></td>
    </tr>`;
  }).join('');
  renderFilterChips();
}

function passFilter(m){
  if(!filters.length) return true;
  return filters.every(f => { const v=f.toLowerCase(); return m.m.toLowerCase().includes(v) || m.cat.toLowerCase().includes(v); });
}
function renderFilterChips(){
  document.getElementById('filterChips').innerHTML = filters.map((f,i)=>`<span class="chip">${f}<span class="x" onclick="removeFilter(${i})">${svg.x}</span></span>`).join('');
}
function removeFilter(i){ filters.splice(i,1); render(); }
document.getElementById('filterInput').addEventListener('keydown', e => {
  if(e.key==='Enter' && e.target.value.trim()){ filters.push(e.target.value.trim()); e.target.value=''; render(); }
  if(e.key==='Backspace' && !e.target.value && filters.length){ filters.pop(); render(); }
});

function toggleService(id){ const s=services.find(x=>x.id===id); s.open=!s.open; saveState(); render(); }
function toggleMetric(id,gi){ const s=services.find(x=>x.id===id); if(s.metrics[gi].source==='rec' && s.recOn) return; s.metrics[gi].on=!s.metrics[gi].on; saveState(); render(); }

// row selection (highlight)
function rowClick(e,id,gi){ const s=services.find(x=>x.id===id); if(s.sel.has(gi)) s.sel.delete(gi); else s.sel.add(gi); render(); }
function selectAll(id,val){ const s=services.find(x=>x.id===id); s.sel.clear(); if(val){ visibleFiltered(s).forEach(m=>s.sel.add(s.metrics.indexOf(m))); } render(); }
function bulk(id,val){ const s=services.find(x=>x.id===id); [...s.sel].forEach(gi=>{ s.metrics[gi].on=val; }); saveState(); render(); }
function removeSel(id){
  const s=services.find(x=>x.id===id);
  const toRemove=[...s.sel].filter(gi=>s.metrics[gi].source==='custom').map(gi=>s.metrics[gi]);
  s.metrics = s.metrics.filter(m=>!toRemove.includes(m));
  s.sel.clear(); saveState(); render(); showToast(toRemove.length+' custom metric'+(toRemove.length!==1?'s':'')+' removed');
}

function toggleRec(id){ const s=services.find(x=>x.id===id); s.recOn=!s.recOn; s.metrics.forEach(m=>{ if(m.source==='rec') m.on=s.recOn; }); s.sel.clear(); if(!s.open) s.open=true; saveState(); render(); }
function toggleAuto(id){ const s=services.find(x=>x.id===id); s.autoOn=!s.autoOn; s.sel.clear(); if(s.autoOn && !s.open) s.open=true; saveState(); render(); }

function openModal(id){ document.getElementById('modal').classList.add('show'); resetModal(); if(id){ document.getElementById('mNs').value=id; } onNsChange(); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function resetModal(){
  document.getElementById('mName').value='';
  document.getElementById('mHint').textContent="Search the validated list, or enter a custom name — we'll verify it exists.";
  document.getElementById('mHint').className='hint';
  document.getElementById('mSuggest').style.display='none';
  document.getElementById('mLabels').value='';
  document.getElementById('mNs').value='ce'; cancelCustomNs(); updateLinking();
}
function onNsChange(){
  const sel=document.getElementById('mNs'), custom=document.getElementById('mNsCustom'), back=document.getElementById('mNsBack');
  if(sel.value==='__custom'){ sel.style.display='none'; custom.style.display='block'; back.style.display='inline-flex'; custom.focus(); }
}
function cancelCustomNs(){
  const sel=document.getElementById('mNs'), custom=document.getElementById('mNsCustom'), back=document.getElementById('mNsBack');
  sel.style.display='block'; custom.style.display='none'; back.style.display='none'; custom.value='';
  if(sel.value==='__custom') sel.value='ce';
}
const mName = document.getElementById('mName');
mName.addEventListener('input', ()=>{
  const v = mName.value.trim().toLowerCase();
  const sug = document.getElementById('mSuggest'), hint = document.getElementById('mHint');
  if(!v){ sug.style.display='none'; hint.textContent="Search the validated list, or enter a custom name — we'll verify it exists."; hint.className='hint'; return; }
  const matches = known.filter(k=>k.includes(v)).slice(0,5);
  if(matches.length){
    sug.innerHTML = matches.map(m=>`<div onmousedown="pickMetric('${m}')">${m}</div>`).join('');
    sug.style.display='block'; hint.innerHTML='Matches found in the available metrics list.'; hint.className='hint';
  } else {
    sug.style.display='none';
    hint.innerHTML='No match found — this may be a custom or misspelled metric. Verify the name before adding.'; hint.className='hint warn';
  }
});
function pickMetric(m){
  mName.value=m; document.getElementById('mSuggest').style.display='none';
  const hint=document.getElementById('mHint'); hint.innerHTML='Verified — this metric exists in the namespace.'; hint.className='hint ok';
}
function updateLinking(){
  const val=document.getElementById('mLabels').value, lc=document.getElementById('linkContent');
  if(!val){ lc.style.color='var(--text-mute)'; lc.textContent='Add labels above to see matching entity types.'; return; }
  lc.style.color='var(--text)'; lc.innerHTML='<div class="ent">GCP::Compute::Instance</div><div class="lbls">project_id, instance_id</div>';
}
function submitMetric(){
  const name=mName.value.trim();
  if(!name){ document.getElementById('mHint').innerHTML='Enter a metric name to continue.'; document.getElementById('mHint').className='hint warn'; return; }
  const sel=document.getElementById('mNs'), customNs=document.getElementById('mNsCustom');
  let s;
  if(customNs.style.display!=='none'){
    const nsName=customNs.value.trim(); if(!nsName){ customNs.focus(); return; }
    s=services.find(x=>x.ns===nsName);
    if(!s){ s={ id:'ns'+Date.now(), name:nsName.split('.')[0].replace(/^\w/,c=>c.toUpperCase()), ns:nsName, open:true, recOn:false, autoOn:false, sel:new Set(), metrics:[] }; services.push(s); }
  } else { s=services.find(x=>x.id===sel.value); }
  s.metrics.push({ m:name, cat:'—', unit:'—', agg:'ALIGN_MEAN', tag:false, on:true, use:5, source:'custom' });
  s.open=true; closeModal(); saveState(); render(); showToast('Custom metric added to ' + s.name);
}
function resetState(){ if(confirm('Reset to defaults? All changes will be lost.')) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
function showToast(msg){
  const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2400);
}
render();
</script>

<script type="module">
  import React from 'https://esm.sh/react@18';
  import { createRoot } from 'https://esm.sh/react-dom@18/client';
  import { Agentation } from 'https://esm.sh/agentation@3?deps=react@18,react-dom@18';
  const params = new URLSearchParams(window.location.search);
  const endpoint = params.get('endpoint') || 'http://localhost:4747';
  const el = document.createElement('div');
  document.body.appendChild(el);
  createRoot(el).render(React.createElement(Agentation, {
    endpoint,
    onSessionCreated: (id) => console.log('Session started:', id)
  }));
</script>
</body>
</html>
